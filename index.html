<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Board interativo da Arquitetura Borboleta — navegue, dê zoom, escreva post-its e conecte etapas.">
<title>Board Borboleta — arquitetura interativa</title>
<style>
  :root{
    --paper:#F4F2EA; --paper-2:#FBFAF4; --ink:#1A1B1A; --ink-2:#3C3D3B;
    --ink-soft:#6E6F6B; --ink-faint:#9A9B95; --hair:#CFCCC0; --hair-2:#B7B5A7;
    --body:#1A1B1A; --body-txt:#F7F5ED; --sel:#C69A2E;
    --pi-yellow:#FCE68A; --pi-pink:#F7BFD0; --pi-blue:#AFD6EC; --pi-green:#BFE3B4; --pi-white:#FBFAF4;
    font-family:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;color:var(--ink);background:#E7E4D9;overflow:hidden;-webkit-font-smoothing:antialiased}
  .serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif}

  .bar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    padding:9px 14px;background:rgba(20,20,19,.95);color:#F4F2EA;box-shadow:0 6px 22px -14px rgba(0,0,0,.6)}
  .bar .brand{font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:12px;display:flex;align-items:center;gap:9px;margin-right:auto}
  .bar .brand small{font-weight:500;letter-spacing:.03em;text-transform:none;color:#B6B4A6;font-size:11px}
  .btn{font:inherit;font-size:12px;font-weight:600;letter-spacing:.02em;color:#F4F2EA;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);padding:7px 12px;border-radius:6px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:rgba(255,255,255,.16)}
  .btn:focus-visible{outline:2px solid var(--pi-yellow);outline-offset:2px}
  .btn.primary{background:var(--pi-yellow);color:#1A1B1A;border-color:transparent;font-weight:700}
  .palette{display:flex;gap:5px;align-items:center}
  .sw{width:19px;height:19px;border-radius:5px;border:2px solid rgba(255,255,255,.35);cursor:pointer;transition:.14s;padding:0}
  .sw[aria-pressed="true"]{border-color:#fff;transform:scale(1.12);box-shadow:0 0 0 2px rgba(255,255,255,.25)}
  .sep{width:1px;height:22px;background:rgba(255,255,255,.16);margin:0 3px}
  .bar a.link{color:#E7C86A;font-size:12px;font-weight:600;text-decoration:none;letter-spacing:.02em}
  .bar a.link:hover{text-decoration:underline}

  .stage{position:fixed;inset:52px 0 0 0}
  svg#board{width:100%;height:100%;display:block;touch-action:none;cursor:grab;background:var(--paper)}
  svg#board.panning{cursor:grabbing}
  svg#board.connecting{cursor:crosshair}

  .wing{fill:none;stroke:var(--ink);stroke-width:1.5;vector-effect:non-scaling-stroke}
  .vein{stroke:var(--ink);stroke-width:.7;fill:none;opacity:.16;vector-effect:non-scaling-stroke}
  .zoneName{font-weight:700;letter-spacing:.2em;text-transform:uppercase;fill:var(--ink)}
  .zoneTag{fill:var(--ink-soft);font-weight:600}
  .kicker{fill:var(--ink-faint);font-weight:700;letter-spacing:.34em;text-transform:uppercase}
  .chan{fill:var(--ink-soft);font-weight:600}
  .chan-line{stroke:var(--ink);stroke-width:.8;stroke-dasharray:2 4;opacity:.24;fill:none;vector-effect:non-scaling-stroke}
  .chan-node{fill:var(--ink)}
  .fband-name{fill:var(--body-txt);font-weight:700;letter-spacing:.06em}
  .fband-pct{fill:var(--body-txt);font-weight:600}
  .ftitle{fill:var(--ink-faint);font-weight:700;letter-spacing:.28em;text-transform:uppercase}
  .cli-ring{fill:var(--paper);stroke:var(--ink);stroke-width:2;vector-effect:non-scaling-stroke}
  .cli-core{fill:var(--ink)}
  .cli-lbl{fill:var(--ink);font-weight:700;letter-spacing:.16em;text-transform:uppercase}
  .title-h{fill:var(--ink);font-weight:700}
  .title-s{fill:var(--ink-soft);font-weight:600}

  .slot rect{fill:rgba(255,255,255,.28);stroke:var(--hair-2);stroke-width:1.4;stroke-dasharray:5 4;transition:.15s}
  .slot{cursor:pointer}
  .slot:hover rect{stroke:var(--ink-soft);fill:rgba(255,255,255,.62)}
  .slot.filled rect{opacity:0}
  .slot.filled{pointer-events:none}
  .slot .s-code{fill:var(--ink-faint);font-weight:800;letter-spacing:.06em}
  .slot .s-lab{fill:var(--ink-2);font-weight:600}
  .slot .s-plus{fill:var(--ink-faint);font-weight:300}
  .slot.filled text{opacity:0}
  .slot.droptarget rect{stroke:var(--sel)!important;stroke-dasharray:none!important;fill:rgba(198,154,46,.16)!important;opacity:1!important}

  /* connectors */
  .conn{stroke:var(--ink);stroke-width:2.4;fill:none;vector-effect:non-scaling-stroke}
  .conn.sel{stroke:var(--sel)}
  .conn-hit{stroke:transparent;stroke-width:18;fill:none;cursor:pointer}
  .conn-del{cursor:pointer}
  .conn-del circle{fill:var(--sel)}
  .conn-del text{fill:#fff;font-weight:700;text-anchor:middle}
  #temp{stroke:var(--sel);stroke-width:2.4;stroke-dasharray:6 5;fill:none;vector-effect:non-scaling-stroke;pointer-events:none}

  /* notes */
  .note-body{width:100%;height:100%;display:flex;flex-direction:column;position:relative;
    box-shadow:2px 4px 11px -4px rgba(0,0,0,.34);border-radius:2px;overflow:visible}
  .note-head{height:19px;display:flex;align-items:center;gap:4px;padding:0 5px;cursor:grab;
    border-bottom:1px solid rgba(0,0,0,.08);flex:none;user-select:none}
  .note.dragging .note-head{cursor:grabbing}
  .note-grip{color:rgba(0,0,0,.32);font-size:11px;line-height:1;letter-spacing:-1px}
  .note-tag{flex:1;font-size:8px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:rgba(0,0,0,.5);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .note-cbtn,.note-del{width:14px;height:14px;border:0;background:transparent;cursor:pointer;padding:0;display:grid;place-items:center;flex:none}
  .note-cbtn i{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.3);display:block}
  .note-del{color:rgba(0,0,0,.45);font-size:12px;font-weight:700;line-height:1}
  .note-del:hover{color:rgba(0,0,0,.8)}
  .note-txt{flex:1;outline:none;padding:7px 8px;font-size:12.5px;line-height:1.28;font-weight:500;color:#26251c;
    overflow:auto;overflow-wrap:anywhere;cursor:text}
  .note-txt:empty::before{content:"escreva…";color:rgba(0,0,0,.28);font-style:italic}
  /* connect handles */
  .handle{position:absolute;width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid var(--sel);
    opacity:0;transition:opacity .12s;cursor:crosshair;z-index:5}
  .note-body:hover .handle,.note.hot .handle{opacity:1}
  .handle.ht{top:-7px;left:50%;transform:translateX(-50%)}
  .handle.hr{right:-7px;top:50%;transform:translateY(-50%)}
  .handle.hb{bottom:-7px;left:50%;transform:translateX(-50%)}
  .handle.hl{left:-7px;top:50%;transform:translateY(-50%)}
  .note.droptarget .note-body{outline:2px solid var(--sel);outline-offset:2px}

  .zoombox{position:fixed;left:14px;bottom:14px;z-index:30;display:flex;align-items:center;gap:4px;
    background:rgba(20,20,19,.95);border-radius:10px;padding:5px;box-shadow:0 8px 24px -12px rgba(0,0,0,.5)}
  .zoombox button{width:34px;height:32px;border:0;background:rgba(255,255,255,.08);color:#F4F2EA;border-radius:7px;cursor:pointer;font-size:16px;font-weight:600}
  .zoombox button:hover{background:rgba(255,255,255,.18)}
  .zoombox .zlabel{min-width:52px;text-align:center;color:#F4F2EA;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;cursor:pointer}
  .zoombox .wide{width:auto;padding:0 10px;font-size:11px;font-weight:600}

  .minimap{position:fixed;right:14px;bottom:14px;z-index:30;width:220px;height:150px;
    background:rgba(251,250,244,.94);border:1px solid var(--hair-2);border-radius:10px;overflow:hidden;
    box-shadow:0 10px 30px -14px rgba(0,0,0,.45);cursor:pointer}
  .minimap svg{width:100%;height:100%;display:block}
  .mm-wing{fill:rgba(0,0,0,.04);stroke:var(--ink-soft);stroke-width:2}
  .mm-body{fill:var(--ink)}
  .mm-view{fill:rgba(198,154,46,.18);stroke:var(--sel);stroke-width:3}
  .minimap .mm-label{position:absolute;top:5px;left:8px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}

  .hint{position:fixed;left:50%;top:60px;transform:translateX(-50%);z-index:35;
    background:rgba(20,20,19,.9);color:#F4F2EA;font-size:12px;padding:8px 15px;border-radius:20px;
    box-shadow:0 8px 24px -10px rgba(0,0,0,.6);transition:opacity .5s;pointer-events:none;max-width:92vw;text-align:center}
  @media (prefers-reduced-motion: reduce){*{transition-duration:.001ms!important}}
</style>
</head>
<body>

<div class="bar">
  <span class="brand">Board Borboleta <small>· arquitetura interativa</small></span>
  <button class="btn primary" id="addBtn">+ Post-it</button>
  <div class="palette" id="palette"></div>
  <span class="sep"></span>
  <button class="btn" id="clearBtn">Limpar</button>
  <span class="sep"></span>
  <a class="link" id="a3link" href="https://fabiotgk.github.io/canvas-borboleta/" target="_blank" rel="noopener">Versão A3 (impressão) ↗</a>
</div>

<div class="stage">
  <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="hint" id="hint">Clique numa etapa para escrever · arraste o card pela barra do topo · puxe a bolinha da borda para conectar</div>

<div class="zoombox">
  <button id="zOut" title="Menos zoom">−</button>
  <span class="zlabel" id="zLabel" title="Ir para 100%">100%</span>
  <button id="zIn" title="Mais zoom">+</button>
  <button class="wide" id="zFit" title="Ajustar à tela">Ajustar</button>
</div>

<div class="minimap" id="minimap">
  <span class="mm-label">Mapa</span>
  <svg id="mm" viewBox="-160 -80 1740 1200" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<script>
(function(){
  "use strict";
  const SVGNS="http://www.w3.org/2000/svg", XHTML="http://www.w3.org/1999/xhtml";
  const svg=document.getElementById("board"), mm=document.getElementById("mm");
  const CX=710, TH=560;
  const el=(n,a,t)=>{const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;};

  const ZONES={
    out:{name:"Outbound",tag:"Você vai até o cliente",side:-1,row:"top",
      stages:[["O1","Geração de lista"],["O2","Prospecção ativa"],["O3","Conexão"],["O4","Engajamento"],["O5","Oportunidade"]]},
    in:{name:"Inbound",tag:"O cliente vem até você",side:1,row:"top",
      stages:[["I1","Alcance"],["I2","Atenção"],["I3","Interesse"],["I4","Desejo"],["I5","Ação"]]},
    ret:{name:"Retenção",tag:"Entregar o valor prometido",side:-1,row:"bot",
      stages:[["05","Diagnóstico"],["06","Rampagem"],["07","Dados"],["08","Consolidação"],["09","Tração"]]},
    exp:{name:"Expansão",tag:"Crescer dentro da carteira",side:1,row:"bot",
      stages:[["10","Resultado"],["11","Upsell"],["12","Cross-sell"],["13","Recompra"],["14","Indicação"]]}
  };
  const FUNNEL=[["Oportunidade",100],["Qualificação",64],["Apresentação",38],["Negociação",22]];
  const CHAN_L=["Prospecção Ativa","Reativação de Carteira","Eventos & Indicações"];
  const CHAN_R=["Conteúdo & SEO","Mídia Paga","Redes Sociais"];
  const FORE=[[0,0],[44,-92],[72,-174],[140,-234],[250,-282],[432,-286],[548,-246],[634,-208],[640,-30],[512,10],[356,34],[150,30],[34,6]];
  const HIND=[[0,14],[44,78],[76,152],[142,208],[250,254],[432,258],[548,218],[630,180],[636,18],[510,-6],[352,-2],[150,10],[0,14]];
  function petal(pts,side){let d="M "+(CX+side*pts[0][0])+" "+(TH+pts[0][1]);
    for(let i=1;i<pts.length;i+=3){const a=pts[i],b=pts[i+1],c=pts[i+2];
      d+=` C ${CX+side*a[0]} ${TH+a[1]}, ${CX+side*b[0]} ${TH+b[1]}, ${CX+side*c[0]} ${TH+c[1]}`;}return d+" Z";}
  const FORE_SLOTS=[[190,-178],[336,-178],[482,-178],[268,-70],[404,-70]];
  const HIND_SLOTS=[[268,70],[404,70],[190,178],[336,178],[482,178]];
  const SLOT_W=128, SLOT_H=92;
  function slotCenter(zone,i){const b=zone.row==="top"?FORE_SLOTS:HIND_SLOTS,p=b[i];return {x:CX+zone.side*p[0],y:TH+p[1]};}
  const RAW={yellow:"#FCE68A",pink:"#F7BFD0",blue:"#AFD6EC",green:"#BFE3B4",white:"#FBFAF4"};
  const NW=132, NH=104;  // post-it ~ tamanho do slot

  /* ---------- defs, grid, groups ---------- */
  const defs=el("defs",{});
  const pat=el("pattern",{id:"grid",width:40,height:40,patternUnits:"userSpaceOnUse"});
  pat.appendChild(el("circle",{cx:20,cy:20,r:1.3,fill:"rgba(0,0,0,.11)"}));
  defs.appendChild(pat);
  [["arw","var(--ink)"],["arwS","var(--sel)"]].forEach(([id,col])=>{
    const m=el("marker",{id,viewBox:"0 0 10 10",refX:9,refY:5,markerWidth:7,markerHeight:7,orient:"auto-start-reverse"});
    m.appendChild(el("path",{d:"M0 0 L10 5 L0 10 z",fill:col}));defs.appendChild(m);});
  svg.appendChild(defs);
  svg.appendChild(el("rect",{x:-8000,y:-8000,width:16000,height:16000,fill:"url(#grid)"}));
  const gDiagram=el("g",{}); svg.appendChild(gDiagram);
  const gConn=el("g",{}); svg.appendChild(gConn);
  const gTemp=el("g",{}); svg.appendChild(gTemp);
  const gSlots=el("g",{}); svg.appendChild(gSlots);
  const gNotes=el("g",{}); svg.appendChild(gNotes);

  gDiagram.appendChild(el("text",{class:"title-h serif",x:70,y:96,"font-size":30},"Arquitetura Borboleta"));
  gDiagram.appendChild(el("text",{class:"title-s",x:72,y:120,"font-size":12.5},"Board de trabalho · clique numa etapa e escreva, conecte, dê zoom"));

  Object.values(ZONES).forEach(zone=>{
    const pts=zone.row==="top"?FORE:HIND;
    gDiagram.appendChild(el("path",{class:"wing",d:petal(pts,zone.side)}));
    const tip=zone.row==="top"?[432,-286]:[432,258];
    gDiagram.appendChild(el("path",{class:"vein",d:`M ${CX} ${TH} Q ${CX+zone.side*tip[0]*.45} ${TH+tip[1]*.55} ${CX+zone.side*tip[0]*.9} ${TH+tip[1]*.9}`}));
    const ny=zone.row==="top"?TH-296:TH+300, nx=CX+zone.side*334;
    gDiagram.appendChild(el("text",{class:"zoneName",x:nx,y:ny,"text-anchor":"middle","font-size":16},zone.name));
    gDiagram.appendChild(el("text",{class:"zoneTag",x:nx,y:ny+21,"text-anchor":"middle","font-size":11.5},zone.tag));
  });
  gDiagram.appendChild(el("text",{class:"kicker",x:CX,y:212,"text-anchor":"middle","font-size":11},"Canais de Aquisição"));
  function channels(list,side){list.forEach((name,i)=>{
    const px=side<0?(CX-548+i*150):(CX+248+i*150);
    gDiagram.appendChild(el("circle",{class:"chan-node",cx:px,cy:266,r:5}));
    gDiagram.appendChild(el("text",{class:"chan",x:px,y:250,"text-anchor":"middle","font-size":11},name));
    gDiagram.appendChild(el("path",{class:"chan-line",d:`M ${px} ${274} C ${px} ${330}, ${CX+side*300} ${360}, ${CX+side*300} ${430}`}));
  });}
  channels(CHAN_L,-1); channels(CHAN_R,1);
  const FTOP=286,FBOT=490,WTOP=216,WBOT=82,gap=7,bandH=(FBOT-FTOP-gap*3)/4;
  const wAt=y=>WTOP-(y-FTOP)/(FBOT-FTOP)*(WTOP-WBOT);
  gDiagram.appendChild(el("text",{class:"ftitle",x:CX,y:FTOP-14,"text-anchor":"middle","font-size":10.5},"Funil de Vendas"));
  FUNNEL.forEach((f,i)=>{const yt=FTOP+i*(bandH+gap),yb=yt+bandH,wt=wAt(yt)/2,wb=wAt(yb)/2;
    gDiagram.appendChild(el("path",{fill:"var(--body)",d:`M ${CX-wt} ${yt} L ${CX+wt} ${yt} L ${CX+wb} ${yb} L ${CX-wb} ${yb} Z`}));
    gDiagram.appendChild(el("text",{class:"fband-name",x:CX,y:yt+bandH/2-3,"text-anchor":"middle","font-size":10.5},f[0].toUpperCase()));
    gDiagram.appendChild(el("text",{class:"fband-pct",x:CX,y:yt+bandH/2+15,"text-anchor":"middle","font-size":14},f[1]+"%"));});
  gDiagram.appendChild(el("path",{fill:"var(--body)",d:`M ${CX-WBOT/2} ${FBOT} L ${CX+WBOT/2} ${FBOT} L ${CX+13} ${TH-16} L ${CX-13} ${TH-16} Z`}));
  gDiagram.appendChild(el("circle",{class:"cli-ring",cx:CX,cy:TH,r:27}));
  gDiagram.appendChild(el("circle",{class:"cli-core",cx:CX,cy:TH,r:13}));
  gDiagram.appendChild(el("text",{class:"cli-lbl",x:CX,y:TH+52,"text-anchor":"middle","font-size":11},"Cliente"));

  const slotCenters={};
  Object.entries(ZONES).forEach(([zk,zone])=>{zone.stages.forEach((st,i)=>{
    const c=slotCenter(zone,i); const id="slot:"+zk+i; slotCenters[id]={x:c.x,y:c.y,hw:SLOT_W/2,hh:SLOT_H/2};
    const g=el("g",{class:"slot","data-id":id});
    g.appendChild(el("rect",{x:c.x-SLOT_W/2,y:c.y-SLOT_H/2,width:SLOT_W,height:SLOT_H,rx:8}));
    g.appendChild(el("text",{class:"s-code",x:c.x,y:c.y-16,"text-anchor":"middle","font-size":9},st[0]));
    g.appendChild(el("text",{class:"s-lab",x:c.x,y:c.y+2,"text-anchor":"middle","font-size":11},st[1]));
    g.appendChild(el("text",{class:"s-plus",x:c.x,y:c.y+24,"text-anchor":"middle","font-size":15},"+"));
    g._slot=zk+i; g._tag=st[0]+" · "+st[1];
    gSlots.appendChild(g);
  });});

  /* ---------- view ---------- */
  const CONTENT={x:-120,y:20,w:1660,h:960};
  let vb={x:0,y:0,w:1660,h:960};
  const px=()=>({w:svg.clientWidth||1,h:svg.clientHeight||1});
  function applyVB(){svg.setAttribute("viewBox",`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);updateMinimap();updateZoom();}
  function fit(){const p=px();const ar=p.w/p.h;let w=CONTENT.w,h=CONTENT.h;if(w/h>ar)h=w/ar;else w=h*ar;w*=1.08;h*=1.08;
    vb={x:CONTENT.x+CONTENT.w/2-w/2,y:CONTENT.y+CONTENT.h/2-h/2,w,h};applyVB();}
  function zoomAround(f,cx,cy){const p=px();const wx=vb.x+cx/p.w*vb.w,wy=vb.y+cy/p.h*vb.h;
    let nw=vb.w/f;nw=Math.max(320,Math.min(7000,nw));const nh=nw*vb.h/vb.w;
    vb.x=wx-cx/p.w*nw;vb.y=wy-cy/p.h*nh;vb.w=nw;vb.h=nh;applyVB();}
  function updateZoom(){document.getElementById("zLabel").textContent=Math.round(px().w/vb.w*100)+"%";}
  const toWorld=(clientX,clientY)=>{const r=svg.getBoundingClientRect();return {x:vb.x+(clientX-r.left)/r.width*vb.w,y:vb.y+(clientY-r.top)/r.height*vb.h};};
  const scale=()=>vb.w/(svg.clientWidth||1);

  /* ---------- state ---------- */
  const KEY="borboleta.board.v2";
  let notes=[], conns=[], idc=1, curColor="yellow";
  const save=()=>{try{localStorage.setItem(KEY,JSON.stringify({notes,conns,vb}));}catch(e){}};
  const load=()=>{try{const d=JSON.parse(localStorage.getItem(KEY)||"null");if(d){notes=d.notes||[];conns=d.conns||[];if(d.vb)vb=d.vb;}}catch(e){}};

  /* ---------- notes ---------- */
  const noteEls={};
  const noteCenter=o=>({x:o.x+NW/2,y:o.y+NH/2,hw:NW/2,hh:NH/2});
  const anchorBox=id=>id.startsWith("slot:")?slotCenters[id]:(()=>{const o=notes.find(n=>n.id===id);return o?noteCenter(o):null;})();
  const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const colorKeys=Object.keys(RAW);

  function makeNote(o){
    const g=el("g",{class:"note","data-id":o.id,transform:`translate(${o.x} ${o.y})`});
    const fo=el("foreignObject",{width:NW,height:NH,x:0,y:0,style:"overflow:visible"});
    const body=document.createElementNS(XHTML,"div");body.setAttribute("class","note-body");body.style.background=RAW[o.color]||RAW.yellow;
    body.innerHTML=
      '<div class="note-head">'
        +'<span class="note-grip">⠿</span>'
        +'<span class="note-tag">'+(o.tag?esc(o.tag):"nota")+'</span>'
        +'<button class="note-cbtn" title="cor"><i></i></button>'
        +'<button class="note-del" title="remover">✕</button>'
      +'</div>'
      +'<div class="note-txt" contenteditable="true"></div>'
      +'<span class="handle ht"></span><span class="handle hr"></span><span class="handle hb"></span><span class="handle hl"></span>';
    fo.appendChild(body);g.appendChild(fo);gNotes.appendChild(g);noteEls[o.id]=g;
    const txt=body.querySelector(".note-txt");txt.textContent=o.text||"";
    txt.addEventListener("input",()=>{o.text=txt.textContent;save();});
    txt.addEventListener("pointerdown",e=>e.stopPropagation());          // clicar no corpo = editar, não arrasta/paneja
    // color cycle
    const cb=body.querySelector(".note-cbtn");cb.addEventListener("pointerdown",e=>e.stopPropagation());
    cb.addEventListener("click",e=>{e.stopPropagation();const i=colorKeys.indexOf(o.color);o.color=colorKeys[(i+1)%colorKeys.length];body.style.background=RAW[o.color];updateMinimap();save();});
    // delete
    const del=body.querySelector(".note-del");del.addEventListener("pointerdown",e=>e.stopPropagation());
    del.addEventListener("click",e=>{e.stopPropagation();removeNote(o.id);});
    // drag by header
    dragByHead(g,o,body.querySelector(".note-head"));
    // connect handles
    body.querySelectorAll(".handle").forEach(h=>h.addEventListener("pointerdown",e=>{e.stopPropagation();e.preventDefault();startConnect(o.id,e);}));
    return g;
  }
  function focusNote(id){const g=noteEls[id];if(!g)return;const t=g.querySelector(".note-txt");
    t.focus();const r=document.createRange();r.selectNodeContents(t);const s=getSelection();s.removeAllRanges();s.addRange(r);}

  function dragByHead(g,o,head){
    let sx,sy,ox,oy,moved,drag=false;
    head.addEventListener("pointerdown",e=>{
      if(e.target.closest(".note-cbtn")||e.target.closest(".note-del"))return;
      drag=true;moved=false;sx=e.clientX;sy=e.clientY;ox=o.x;oy=o.y;
      g.classList.add("dragging");head.setPointerCapture(e.pointerId);e.stopPropagation();
    });
    head.addEventListener("pointermove",e=>{if(!drag)return;const s=scale();
      o.x=ox+(e.clientX-sx)*s;o.y=oy+(e.clientY-sy)*s;
      if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>3)moved=true;
      g.setAttribute("transform",`translate(${o.x} ${o.y})`);renderConns();updateMinimap();});
    const end=e=>{if(!drag)return;drag=false;g.classList.remove("dragging");try{head.releasePointerCapture(e.pointerId);}catch(_){}if(moved)save();};
    head.addEventListener("pointerup",end);head.addEventListener("pointercancel",end);
  }

  function addNote(o){o.id=o.id||("n"+(idc++)+"_"+Math.round(performance.now()));
    notes.push(o);if(o.slot){const s=gSlots.querySelector('[data-id="slot:'+o.slot+'"]');if(s)s.classList.add("filled");}
    makeNote(o);save();hideHint();focusNote(o.id);return o;}
  function removeNote(id){const i=notes.findIndex(n=>n.id===id);if(i<0)return;const o=notes[i];
    if(o.slot){const s=gSlots.querySelector('[data-id="slot:'+o.slot+'"]');if(s)s.classList.remove("filled");}
    notes.splice(i,1);noteEls[id].remove();delete noteEls[id];conns=conns.filter(c=>c.a!==id&&c.b!==id);renderConns();updateMinimap();save();}

  // add via slot click
  gSlots.addEventListener("click",e=>{const g=e.target.closest(".slot");if(!g)return;
    const c=slotCenters[g.dataset.id];addNote({x:c.x-NW/2,y:c.y-NH/2,color:curColor,tag:g._tag,slot:g._slot,text:""});});

  /* ---------- connectors ---------- */
  let selConn=null;
  function clip(box,toward){const dx=toward.x-box.x,dy=toward.y-box.y;
    const s=1/Math.max(Math.abs(dx)/box.hw||1e-6,Math.abs(dy)/box.hh||1e-6);return {x:box.x+dx*s,y:box.y+dy*s};}
  function renderConns(){gConn.innerHTML="";conns.forEach(c=>{const A=anchorBox(c.a),B=anchorBox(c.b);if(!A||!B)return;
    const p1=clip(A,B),p2=clip(B,A);
    gConn.appendChild(el("path",{class:"conn-hit",d:`M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`,"data-cid":c.id}));
    gConn.appendChild(el("path",{class:"conn"+(selConn===c.id?" sel":""),d:`M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`,"marker-end":"url(#"+(selConn===c.id?"arwS":"arw")+")"}));
    if(selConn===c.id){const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;const d=el("g",{class:"conn-del","data-cid":c.id});
      d.appendChild(el("circle",{cx:mx,cy:my,r:11}));d.appendChild(el("text",{x:mx,y:my+4,"font-size":13},"✕"));gConn.appendChild(d);}});}
  gConn.addEventListener("click",e=>{const del=e.target.closest(".conn-del");
    if(del){conns=conns.filter(c=>c.id!==del.dataset.cid);selConn=null;renderConns();save();return;}
    const hit=e.target.closest(".conn-hit");if(hit){selConn=selConn===hit.dataset.cid?null:hit.dataset.cid;renderConns();e.stopPropagation();}});

  // drag-to-connect (draw.io style)
  let connecting=null;
  function startConnect(fromId,e){
    connecting={from:fromId};svg.classList.add("connecting");
    const temp=el("path",{id:"temp"});gTemp.appendChild(temp);
    const A=anchorBox(fromId);
    const move=ev=>{const w=toWorld(ev.clientX,ev.clientY);temp.setAttribute("d",`M ${A.x} ${A.y} L ${w.x} ${w.y}`);
      const t=targetAt(ev);highlightDrop(t);};
    const up=ev=>{window.removeEventListener("pointermove",move);window.removeEventListener("pointerup",up);
      svg.classList.remove("connecting");gTemp.innerHTML="";highlightDrop(null);
      const t=targetAt(ev);if(t&&t!==fromId){conns.push({id:"c"+(idc++)+"_"+Math.round(performance.now()),a:fromId,b:t});renderConns();save();}
      connecting=null;};
    window.addEventListener("pointermove",move);window.addEventListener("pointerup",up);
  }
  function targetAt(ev){const els=document.elementsFromPoint(ev.clientX,ev.clientY);
    for(const n of els){const note=n.closest&&n.closest(".note");if(note)return note.dataset.id;
      const slot=n.closest&&n.closest(".slot");if(slot)return slot.dataset.id;}return null;}
  let lastDrop=null;
  function highlightDrop(id){if(lastDrop===id)return;
    document.querySelectorAll(".droptarget").forEach(x=>x.classList.remove("droptarget"));
    if(id){const g=noteEls[id]||gSlots.querySelector('[data-id="'+id.replace(/"/g,'')+'"]')||gSlots.querySelector('[data-id="'+id+'"]');if(g)g.classList.add("droptarget");}
    lastDrop=id;}

  /* ---------- pan / zoom ---------- */
  let pan=false,psx,psy,pvx,pvy;
  svg.addEventListener("pointerdown",e=>{
    if(connecting)return;
    if(e.target.closest(".note")||e.target.closest(".slot")||e.target.closest(".conn-hit")||e.target.closest(".conn-del"))return;
    selConn=null;renderConns();
    pan=true;psx=e.clientX;psy=e.clientY;pvx=vb.x;pvy=vb.y;svg.classList.add("panning");svg.setPointerCapture(e.pointerId);});
  svg.addEventListener("pointermove",e=>{if(!pan)return;const p=px();vb.x=pvx-(e.clientX-psx)*vb.w/p.w;vb.y=pvy-(e.clientY-psy)*vb.h/p.h;applyVB();});
  const endPan=e=>{if(!pan)return;pan=false;svg.classList.remove("panning");try{svg.releasePointerCapture(e.pointerId);}catch(_){}save();};
  svg.addEventListener("pointerup",endPan);svg.addEventListener("pointercancel",endPan);
  svg.addEventListener("wheel",e=>{e.preventDefault();const r=svg.getBoundingClientRect();zoomAround(e.deltaY<0?1.12:1/1.12,e.clientX-r.left,e.clientY-r.top);save();},{passive:false});
  const active=new Map();let pinchD=0;
  svg.addEventListener("pointerdown",e=>active.set(e.pointerId,e));
  svg.addEventListener("pointermove",e=>{if(!active.has(e.pointerId))return;active.set(e.pointerId,e);
    if(active.size===2){const[a,b]=[...active.values()];const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      const r=svg.getBoundingClientRect();const mx=(a.clientX+b.clientX)/2-r.left,my=(a.clientY+b.clientY)/2-r.top;
      if(pinchD)zoomAround(d/pinchD,mx,my);pinchD=d;pan=false;}});
  const clrP=e=>{active.delete(e.pointerId);if(active.size<2)pinchD=0;};
  svg.addEventListener("pointerup",clrP);svg.addEventListener("pointercancel",clrP);
  // duplo-clique no vazio cria post-it ali
  svg.addEventListener("dblclick",e=>{if(e.target.closest(".note")||e.target.closest(".slot"))return;
    const w=toWorld(e.clientX,e.clientY);addNote({x:w.x-NW/2,y:w.y-NH/2,color:curColor,text:""});});

  /* ---------- minimap ---------- */
  const mmContent=el("g",{});mm.appendChild(mmContent);
  Object.values(ZONES).forEach(z=>mmContent.appendChild(el("path",{class:"mm-wing",d:petal(z.row==="top"?FORE:HIND,z.side)})));
  mmContent.appendChild(el("circle",{class:"mm-body",cx:CX,cy:TH,r:26}));
  const mmNotes=el("g",{});mm.appendChild(mmNotes);
  const mmView=el("rect",{class:"mm-view",x:0,y:0,width:10,height:10});mm.appendChild(mmView);
  function updateMinimap(){mmView.setAttribute("x",vb.x);mmView.setAttribute("y",vb.y);mmView.setAttribute("width",vb.w);mmView.setAttribute("height",vb.h);
    mmNotes.innerHTML="";notes.forEach(o=>mmNotes.appendChild(el("rect",{x:o.x,y:o.y,width:NW,height:NH,rx:6,fill:RAW[o.color]||RAW.yellow,stroke:"rgba(0,0,0,.25)","stroke-width":2})));}
  document.getElementById("minimap").addEventListener("pointerdown",e=>{const r=mm.getBoundingClientRect();
    const vbx=-160,vby=-80,vbw=1740,vbh=1200,sc=Math.min(r.width/vbw,r.height/vbh);
    const offx=(r.width-vbw*sc)/2,offy=(r.height-vbh*sc)/2;
    vb.x=(vbx+(e.clientX-r.left-offx)/sc)-vb.w/2;vb.y=(vby+(e.clientY-r.top-offy)/sc)-vb.h/2;applyVB();save();});

  /* ---------- toolbar ---------- */
  const pal=document.getElementById("palette");
  colorKeys.forEach(k=>{const b=document.createElement("button");b.className="sw";b.style.background=RAW[k];b.dataset.k=k;
    b.setAttribute("aria-pressed",k===curColor?"true":"false");b.title="Cor do próximo post-it";
    b.addEventListener("click",()=>{curColor=k;pal.querySelectorAll(".sw").forEach(s=>s.setAttribute("aria-pressed",s.dataset.k===k?"true":"false"));});pal.appendChild(b);});
  let freeN=0;
  document.getElementById("addBtn").addEventListener("click",()=>{
    // nasce numa área livre (parte de baixo do que está visível), com leve cascata
    const wx=vb.x+vb.w*0.16+(freeN%6)*20, wy=vb.y+vb.h*0.80+Math.floor(freeN/6)*20;freeN++;
    addNote({x:wx,y:wy,color:curColor,text:""});});
  document.getElementById("clearBtn").addEventListener("click",()=>{if(!notes.length&&!conns.length)return;
    if(confirm("Remover todos os post-its e conexões do board?")){notes.slice().forEach(n=>removeNote(n.id));conns=[];selConn=null;renderConns();updateMinimap();save();}});
  document.getElementById("zIn").addEventListener("click",()=>{const p=px();zoomAround(1.25,p.w/2,p.h/2);save();});
  document.getElementById("zOut").addEventListener("click",()=>{const p=px();zoomAround(1/1.25,p.w/2,p.h/2);save();});
  document.getElementById("zFit").addEventListener("click",()=>{fit();save();});
  document.getElementById("zLabel").addEventListener("click",()=>{const p=px();const cx=vb.x+vb.w/2,cy=vb.y+vb.h/2;vb.w=p.w;vb.h=p.h;vb.x=cx-vb.w/2;vb.y=cy-vb.h/2;applyVB();save();});

  window.addEventListener("keydown",e=>{
    if(e.key==="Escape"){if(connecting){gTemp.innerHTML="";svg.classList.remove("connecting");connecting=null;}selConn=null;renderConns();}
    if((e.key==="Delete")&&selConn){conns=conns.filter(c=>c.id!==selConn);selConn=null;renderConns();save();}});
  let hintT=setTimeout(hideHint,9000);function hideHint(){const h=document.getElementById("hint");if(h)h.style.opacity="0";}
  svg.addEventListener("pointerdown",()=>clearTimeout(hintT),{once:true});
  window.addEventListener("resize",()=>{vb.h=vb.w*((svg.clientHeight||1)/(svg.clientWidth||1));applyVB();});

  /* ---------- boot ---------- */
  load();
  notes.forEach(o=>{makeNote(o);if(o.slot){const s=gSlots.querySelector('[data-id="slot:'+o.slot+'"]');if(s)s.classList.add("filled");}});
  renderConns();
  if(!localStorage.getItem(KEY))fit();else applyVB();
  updateMinimap();
})();
</script>
</body>
</html>
